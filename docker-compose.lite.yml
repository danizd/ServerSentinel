version: '3.8'

services:
  honeypot:
    build: .
    container_name: sentinel-honeypot
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${SSH_PORT:-2222}:2222"
      - "${FTP_PORT:-2121}:2121"
      - "${MYSQL_PORT:-3306}:3306"
      - "${BLOG_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ./blog:/app/blog
      - ./logs:/app/logs
    env_file:
      - .env
    networks:
      - sentinel-net
    deploy:
      resources:
        limits:
          memory: 256M
