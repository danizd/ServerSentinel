version: '3.8'

services:
  honeypot:
    build: .
    container_name: sentinel-honeypot
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:${HTTP_PORT:-80}"
      - "${SSH_PORT:-2222}:${SSH_PORT:-2222}"
      - "${FTP_PORT:-2121}:${FTP_PORT:-2121}"
      - "${MYSQL_PORT:-3306}:${MYSQL_PORT:-3306}"
      - "${BLOG_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ./blog:/app/blog
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - sentinel-net
    deploy:
      resources:
        limits:
          memory: 512M

  ollama:
    image: ollama/ollama:latest
    container_name: sentinel-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - sentinel-net
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  ollama-data:

networks:
  sentinel-net:
    driver: bridge
